services:
  postgres:
    image: postgres:16
    container_name: database
    restart: always
    environment:
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: ne23efxgbt2
      POSTGRES_DB: trends
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: redis_server
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always   


volumes:
  postgres_data:
  redis_data: